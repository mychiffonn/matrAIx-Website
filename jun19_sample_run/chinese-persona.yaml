# matraix.yaml — Chinese-Only Speaker Persona for Book Search & Language Exam

project: chinese-persona-bookfinder
contact: "research@matraix.ai"

# ── 1. The surface the agents click through ──────────────
frontend:
  url: "https://staging.library.local"          # Book search & exam platform
  repo: "github.com/matraix/bookfinder"
  auth:
    type: test-account
    user: "persona-zh@library.local"
    secret: env:MATRAIX_PERSONA_PW

# ── 2. The API behind every click (the I/O contract) ─────
backend:
  api: "https://staging.library.local/api"
  spec: "openapi.yaml"
  sandbox: "docker-compose.yml"
  repo: "github.com/matraix/bookfinder-api"

# ── 3. Enough state to make flows realistic ──────────────
data:
  schema: "schema.sql"
  seed: "library_sample.json"
  pii: none

# ── 4. What a successful run looks like, end to end ──────
goals:
  # Task 1: Find a specific book by title
  - flow: search_book_by_title
    entry: "/search"
    success: book_found_and_displayed
    inputs:
      - { field: book_title, type: string, format: "Chinese book title (e.g., 活着)" }
      - { field: language, type: string, format: "zh-CN only, persona speaks only Chinese" }
    output:
      schema: "search_result.schema.json"
      metrics: [success_rate, search_latency_ms, result_relevance]

  # Task 2: Find books by a specific Chinese author
  - flow: search_by_author
    entry: "/search"
    success: author_results_displayed
    inputs:
      - { field: author_name, type: string, format: "Chinese author name (e.g., 莫言)" }
      - { field: language, type: string, format: "Chinese UI only" }
    output:
      schema: "author_search_result.schema.json"
      metrics: [results_count, search_accuracy, error_rate]

  # Task 3: Exam - English proficiency test (persona must complete with limited English)
  - flow: english_exam
    entry: "/exam/english"
    success: exam_submitted_with_score
    inputs:
      - { field: exam_type, type: string, format: "english_proficiency" }
      - { field: native_language, type: string, format: "zh-CN, persona only fluent in Chinese" }
    output:
      schema: "exam_result.schema.json"
      metrics: [score, completion_time_ms, attempt_count, error_rate]

  # Task 4: Exam - Spanish proficiency test (persona must complete with no Spanish knowledge)
  - flow: spanish_exam
    entry: "/exam/spanish"
    success: exam_submitted_with_score
    inputs:
      - { field: exam_type, type: string, format: "spanish_proficiency" }
      - { field: native_language, type: string, format: "zh-CN, no Spanish fluency" }
    output:
      schema: "exam_result.schema.json"
      metrics: [score, completion_time_ms, help_requests, confusion_rate]

# ── 5. Who the agents emulate ───────────────────────────
segments:
  - name: chinese_native_speaker
    language: zh-CN
    proficiency:
      chinese: native
      english: limited
      spanish: none
    behavior: "Persona only comprehends and responds in Simplified Chinese; limited English exposure"
    use_case: "Test multilingual UI graceful degradation and non-native language exam handling"

# ── 6. Where the report lands in your pipeline ──────────
report:
  format: [json, html]
  webhook: "https://matraix.ai/hooks/chinese-persona-results"
  summary_fields:
    - book_search_success_rate
    - author_search_accuracy
    - english_exam_completion_rate
    - spanish_exam_attempt_rate
    - language_barrier_incidents
    - ui_comprehension_score
