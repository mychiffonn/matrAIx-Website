<!DOCTYPE html>
<html lang="en" data-theme="dark" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>matrAIx — Persona Attribute Survey</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="description" content="Fill all persona attributes across 43 groups and export attributes.json." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=6" />
  <link rel="stylesheet" href="play.css?v=10" />
  <link rel="stylesheet" href="dark-theme.css?v=5" />
</head>
<body class="play-body">
  <div class="grain" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Header -->
  <header class="nav">
    <a class="brand" href="/">
      <span class="brand-name">Matr<em>AI</em>x</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="persona.html">Persona</a>
      <a href="demo.html">Demo</a>
    </nav>
    <a href="access.html" class="btn btn-ghost nav-cta">
      <span class="dot live"></span> Request access
    </a>
  </header>

  <main class="play-main">
    <section class="play-head">
      <div class="hero-eyebrow">
        <span class="tick">//</span> PERSONA ATTRIBUTE COLLECTION
        <span class="sep">—</span>
        <span class="status"><span class="dot live"></span> V1 BUILDER</span>
      </div>
      <h1 class="play-title" id="titleText">Persona Attribute Survey</h1>
      <p class="play-sub" id="subtitleText">
        Complete all 1290 persona dimensions in 43 groups. Progress is auto-saved locally so you can continue after refresh.
      </p>
    </section>

    <section class="play-quiz">
      <div class="toolbar">
        <label class="tool-field grow">
          <span id="searchLabel">Search dimensions</span>
          <input id="dimensionSearch" type="text" placeholder="search dimensions..." />
        </label>
        <label class="tool-field">
          <span id="languageLabel">Language</span>
          <select id="langToggle">
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </label>
      </div>

      <div class="play-progress" id="progressStats"></div>
      <div class="tab-wrap" id="groupTabs"></div>
      <div class="play-step" id="groupContent"></div>

      <div class="play-controls">
        <button id="prevGroupBtn" type="button" class="btn btn-ghost">← Previous</button>
        <button id="nextGroupBtn" type="button" class="btn btn-ghost">Next →</button>
        <button id="saveDraftBtn" type="button" class="btn btn-ghost">Save draft</button>
        <button id="fillDefaultsBtn" type="button" class="btn btn-ghost">Fill group defaults</button>
        <button id="downloadBtn" type="button" class="btn btn-solid">Download attributes.json</button>
        <button id="resetBtn" type="button" class="btn btn-ghost">Reset group</button>
      </div>
      <div class="play-controls secondary">
        <span id="status" class="play-status"></span>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span class="brand-name small">Matr<em>AI</em>x<span class="tld">.ai</span></span>
    <span class="foot-meta">LET'S PLAY · PERSONA FROM PERSONALITY · © 2026</span>
  </footer>

  <script src="interactive-decks.js?v=2"></script>
  <script src="communication-smart-bank.js?v=1"></script>
  <script src="agent-adoption-smart-bank.js?v=1"></script>
  <script src="worldview-smart-bank.js?v=1"></script>
  <script src="values-motivation-smart-bank.js?v=1"></script>
  <script src="personality-character-smart-bank.js?v=1"></script>
  <script src="play.js?v=23"></script>
  <script src="site-performance.js?v=1"></script>
</body>
</html>
